<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVP Draft - ROV Draft Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pvp-styles.css">
  <style>
    body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
    .timer-warning { animation: timer-pulse 1s infinite; color: #ef4444; }
    @keyframes timer-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .my-turn { animation: pulse-turn 2s infinite; }
    @keyframes pulse-turn { 0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } }
    .phase-indicator { transition: all 0.3s ease; }
    .phase-active { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
    .draft-slot { transition: all 0.2s ease; }
    .draft-slot.filled:hover .remove-btn { opacity: 1; }
    .remove-btn { opacity: 0; transition: opacity 0.2s ease; }
    .hero-card { transition: all 0.2s ease; }
    .hero-card:hover:not(.disabled) { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); }
    .hero-card.disabled { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
    .hero-card.global-banned { border-color: #f59e0b; position: relative; }
    .hero-card.global-banned::after { content: '🔒'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }
    .chat-message { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-gray-800 overflow-x-hidden bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 min-h-screen">
  <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="lobby.html" class="flex items-center gap-2 text-gray-600 hover:text-gray-800"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
          <div class="h-6 w-px bg-gray-300"></div>
          <div>
            <h1 class="text-lg font-bold">PVP Draft</h1>
            <p class="text-xs text-gray-500">Room: <span id="room-id-display">------</span></p>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-4">
            <div class="text-center"><p class="text-xs text-gray-500">เกม</p><p id="game-number" class="font-bold text-lg">1/3</p></div>
            <div class="h-8 w-px bg-gray-300"></div>
            <div class="text-center"><p class="text-xs text-gray-500">เวลา</p><p id="timer-display" class="font-bold text-2xl text-blue-600">60</p></div>
          </div>
          <div class="flex items-center gap-2">
            <button id="chat-toggle-btn" class="p-2 text-gray-600 hover:text-blue-600 relative"><i data-lucide="message-circle" class="w-6 h-6"></i><span id="chat-badge" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full hidden">!</span></button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-20 pb-4 px-4">
    <div class="max-w-7xl mx-auto">
      <div class="bg-white rounded-xl p-3 mb-4 shadow-sm">
        <div class="flex justify-center gap-2">
          <div class="phase-indicator px-4 py-2 rounded-lg text-sm font-medium bg-gray-100" data-phase="ban1">Ban Phase 1</div>
          <div class="text-gray-400">→</div>
          <div class="phase-indicator px-4 py-2 rounded-lg text-sm font-medium bg-gray-100" data-phase="pick1">Pick Phase 1</div>
          <div class="text-gray-400">→</div>
          <div class="phase-indicator px-4 py-2 rounded-lg text-sm font-medium bg-gray-100" data-phase="ban2">Ban Phase 2</div>
          <div class="text-gray-400">→</div>
          <div class="phase-indicator px-4 py-2 rounded-lg text-sm font-medium bg-gray-100" data-phase="pick2">Pick Phase 2</div>
        </div>
      </div>

      <div id="turn-info" class="text-center mb-4 py-3 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl">
        <p class="text-lg font-medium"><span id="turn-team">Blue Team</span> - <span id="turn-action">แบน 1 ตัว</span></p>
      </div>

      <div class="grid lg:grid-cols-12 gap-4">
        <div id="blue-panel" class="lg:col-span-3 bg-white rounded-2xl p-4 shadow-sm border-2 border-transparent">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-blue-500"></div><h3 class="font-bold">Blue Team</h3></div>
            <span id="blue-player" class="text-sm text-gray-500">Player 1</span>
          </div>
          <div class="mb-4">
            <p class="text-xs text-gray-500 mb-2">Bans</p>
            <div id="blue-bans" class="grid grid-cols-4 gap-2"></div>
          </div>
          <div>
            <p class="text-xs text-gray-500 mb-2">Picks</p>
            <div id="blue-picks" class="space-y-2"></div>
          </div>
        </div>

        <div class="lg:col-span-6">
          <div class="bg-white rounded-xl p-3 mb-4 shadow-sm">
            <div class="flex flex-wrap justify-center gap-2">
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white" data-role="all">ทั้งหมด</button>
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200" data-role="tank">Tank</button>
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200" data-role="fighter">Fighter</button>
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200" data-role="assassin">Assassin</button>
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200" data-role="mage">Mage</button>
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200" data-role="marksman">Marksman</button>
              <button class="role-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200" data-role="support">Support</button>
            </div>
          </div>
          <div class="bg-white rounded-xl p-3 mb-4 shadow-sm">
            <div class="relative">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
              <input type="text" id="hero-search" placeholder="ค้นหาตัวละคร..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div id="heroes-grid" class="bg-white rounded-2xl p-4 shadow-sm">
            <div id="heroes-container" class="grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 gap-3"></div>
          </div>
        </div>

        <div id="red-panel" class="lg:col-span-3 bg-white rounded-2xl p-4 shadow-sm border-2 border-transparent">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-red-500"></div><h3 class="font-bold">Red Team</h3></div>
            <span id="red-player" class="text-sm text-gray-500">Player 2</span>
          </div>
          <div class="mb-4">
            <p class="text-xs text-gray-500 mb-2">Bans</p>
            <div id="red-bans" class="grid grid-cols-4 gap-2"></div>
          </div>
          <div>
            <p class="text-xs text-gray-500 mb-2">Picks</p>
            <div id="red-picks" class="space-y-2"></div>
          </div>
        </div>
      </div>

      <div class="mt-4 flex justify-center gap-4">
        <button id="surrender-btn" class="px-6 py-3 bg-red-100 text-red-600 rounded-xl font-medium hover:bg-red-200">ยอมแพ้</button>
        <button id="next-game-btn" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 hidden">เกมถัดไป</button>
        <button id="end-match-btn" class="px-6 py-3 bg-green-600 text-white rounded-xl font-medium hover:bg-green-700 hidden">จบแมตช์</button>
      </div>
    </div>
  </main>

  <div id="chat-sidebar" class="fixed top-16 right-0 bottom-0 w-80 bg-white shadow-xl transform translate-x-full transition-transform z-40">
    <div class="flex flex-col h-full">
      <div class="p-4 border-b flex items-center justify-between">
        <h4 class="font-semibold flex items-center gap-2"><i data-lucide="message-circle" class="w-5 h-5"></i>แชท</h4>
        <button id="close-chat-btn" class="p-1 hover:bg-gray-100 rounded"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2"><p class="text-sm text-gray-400 text-center">เริ่มการสนทนา...</p></div>
      <div class="p-4 border-t">
        <div class="flex gap-2">
          <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ..." class="flex-1 px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
          <button id="send-chat-btn" class="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i data-lucide="send" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div id="game-complete-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] hidden flex items-center justify-center">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 text-center">
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check-circle" class="w-10 h-10 text-green-600"></i></div>
      <h2 class="text-2xl font-bold mb-2">ดราฟเสร็จสิ้น!</h2>
      <p class="text-gray-600 mb-6">เกมที่ <span id="completed-game-number">1</span> เสร็จสิ้นแล้ว</p>
      <div class="flex gap-4">
        <button id="modal-next-game-btn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700">เกมถัดไป</button>
        <button id="modal-end-match-btn" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium hover:bg-gray-300">จบแมตช์</button>
      </div>
    </div>
  </div>

  <div id="match-complete-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] hidden flex items-center justify-center">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 text-center">
      <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="trophy" class="w-10 h-10 text-yellow-600"></i></div>
      <h2 class="text-2xl font-bold mb-2">แมตช์จบแล้ว!</h2>
      <p class="text-gray-600 mb-6">ขอบคุณที่เล่น PVP Draft</p>
      <div class="flex gap-4">
        <button id="rematch-btn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700">เล่นอีกครั้ง</button>
        <button id="back-to-lobby-btn" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium hover:bg-gray-300">กลับห้องรอ</button>
      </div>
    </div>
  </div>

  <script src="../js/data/heroes.js" type="module"></script>
  <script src="../js/services/FirebaseService.js" type="module"></script>
  <script src="../js/services/PVPManager.js" type="module"></script>
  <script src="../js/utils/DraftManager.js" type="module"></script>
  <script src="../js/utils/PVPDraftManager.js" type="module"></script>
  <script src="../js/pages/pvp-draft.js" type="module"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
