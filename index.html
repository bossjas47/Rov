<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROV Draft Pro - PVP Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        .room-card { transition: all 0.3s ease; }
        .room-card:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }
        .animate-glow { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="text-white">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Navbar -->
    <nav class="glass fixed top-0 left-0 right-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center">
                    <i data-lucide="swords" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">ROV DRAFT</h1>
                    <p class="text-xs text-gray-400">PVP PRO</p>
                </div>
            </div>
            <div id="userSection" class="flex items-center gap-4">
                <button onclick="showLoginModal()" class="btn-primary px-4 py-2 rounded-lg font-medium text-sm">
                    Login
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-6">
        <div class="max-w-6xl mx-auto">
            <!-- Hero Section -->
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-bold mb-4 glow-text">PVP Draft System</h2>
                <p class="text-gray-400 text-lg">Create room or join with room code</p>
            </div>

            <!-- Action Buttons -->
            <div class="grid md:grid-cols-3 gap-6 mb-12">
                <!-- Solo Draft -->
                <div class="glass rounded-2xl p-8 text-center border-2 border-purple-500/30">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-purple-500 to-pink-600 flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="user" class="w-8 h-8 text-white"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">Solo Draft</h3>
                    <p class="text-gray-400 mb-6">Practice draft alone</p>
                    <button onclick="startSoloDraft()" class="w-full py-3 rounded-xl font-semibold bg-gradient-to-r from-purple-500 to-pink-600 hover:shadow-lg hover:shadow-purple-500/30 transition-all">
                        Start Solo
                    </button>
                </div>

                <!-- Create Room -->
                <div class="glass rounded-2xl p-8 text-center">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-600 flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="plus-circle" class="w-8 h-8 text-white"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">Create Room</h3>
                    <p class="text-gray-400 mb-6">Create a new draft room</p>
                    <button onclick="showCreateRoomModal()" class="btn-primary w-full py-3 rounded-xl font-semibold">
                        Create Room
                    </button>
                </div>

                <!-- Join Room -->
                <div class="glass rounded-2xl p-8 text-center">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-blue-500 to-cyan-600 flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="log-in" class="w-8 h-8 text-white"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">Join Room</h3>
                    <p class="text-gray-400 mb-6">Enter 6-digit room code</p>
                    <div class="flex gap-2">
                        <input type="text" id="joinCode" maxlength="6" placeholder="123456" 
                               class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-center text-xl font-bold tracking-widest uppercase focus:outline-none focus:border-blue-500">
                        <button onclick="joinRoom()" class="btn-primary px-6 py-3 rounded-xl font-semibold">
                            Join
                        </button>
                    </div>
                </div>
            </div>

            <!-- Active Rooms -->
            <div class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="users" class="w-5 h-5 text-blue-400"></i>
                        Active Rooms
                    </h3>
                    <button onclick="refreshRooms()" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        Refresh
                    </button>
                </div>
                <div id="roomsList" class="space-y-3">
                    <p class="text-gray-500 text-center py-8">No active rooms</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Room Modal -->
    <div id="createRoomModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 max-w-md w-full">
            <h3 class="text-2xl font-bold mb-6">Create Room</h3>
            <form onsubmit="createRoom(event)">
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">BO Format</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button type="button" onclick="selectBO(1)" class="bo-btn py-2 rounded-lg bg-white/10 border border-white/20 hover:bg-white/20" data-bo="1">BO1</button>
                        <button type="button" onclick="selectBO(3)" class="bo-btn py-2 rounded-lg bg-blue-500 border border-blue-400" data-bo="3">BO3</button>
                        <button type="button" onclick="selectBO(5)" class="bo-btn py-2 rounded-lg bg-white/10 border border-white/20 hover:bg-white/20" data-bo="5">BO5</button>
                        <button type="button" onclick="selectBO(7)" class="bo-btn py-2 rounded-lg bg-white/10 border border-white/20 hover:bg-white/20" data-bo="7">BO7</button>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-2">First Pick</label>
                    <select id="firstPick" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                        <option value="random">Random</option>
                        <option value="host">Host (Me)</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('createRoomModal')" class="flex-1 btn-secondary py-3 rounded-xl font-semibold">Cancel</button>
                    <button type="submit" class="flex-1 btn-primary py-3 rounded-xl font-semibold">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 max-w-md w-full">
            <h3 class="text-2xl font-bold mb-6">Login</h3>
            <form onsubmit="login(event)">
                <div class="mb-4">
                    <input type="email" id="loginEmail" placeholder="Email" required
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <div class="mb-6">
                    <input type="password" id="loginPassword" placeholder="Password" required
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full btn-primary py-3 rounded-xl font-semibold mb-4">Login</button>
                <button type="button" onclick="loginWithGoogle()" class="w-full btn-secondary py-3 rounded-xl font-semibold flex items-center justify-center gap-2">
                    <i data-lucide="chrome" class="w-5 h-5"></i>
                    Login with Google
                </button>
            </form>
            <p class="text-center text-gray-400 mt-4 text-sm">
                Don't have account? <button onclick="showRegisterModal()" class="text-blue-400 hover:underline">Register</button>
            </p>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 max-w-md w-full">
            <h3 class="text-2xl font-bold mb-6">Register</h3>
            <form onsubmit="register(event)">
                <div class="mb-4">
                    <input type="text" id="regUsername" placeholder="Username" required
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <div class="mb-4">
                    <input type="email" id="regEmail" placeholder="Email" required
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <div class="mb-6">
                    <input type="password" id="regPassword" placeholder="Password" required
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full btn-primary py-3 rounded-xl font-semibold">Register</button>
            </form>
            <p class="text-center text-gray-400 mt-4 text-sm">
                Have account? <button onclick="showLoginModal()" class="text-blue-400 hover:underline">Login</button>
            </p>
        </div>
    </div>

    <script src="js/lobby.js"></script>
</body>
</html>
