<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Room - ROV Draft Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        .player-card { transition: all 0.3s ease; }
        .player-ready { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .player-waiting { border-color: #f59e0b; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse 2s infinite; }
        .chat-message { animation: slideIn 0.3s ease; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-white">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Navbar -->
    <nav class="glass fixed top-0 left-0 right-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="leaveRoom()" class="btn-secondary p-2 rounded-lg">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <div>
                    <h1 class="text-lg font-bold">Room <span id="roomCode" class="text-blue-400">------</span></h1>
                    <p class="text-xs text-gray-400">Waiting Room</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="copyRoomCode()" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    Copy Code
                </button>
                <button onclick="copyRoomLink()" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                    <i data-lucide="link" class="w-4 h-4"></i>
                    Copy Link
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-6 px-6">
        <div class="max-w-6xl mx-auto">
            <!-- Players Section -->
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <!-- Host -->
                <div id="hostCard" class="glass rounded-2xl p-6 player-card player-waiting">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-blue-500 to-blue-600 flex items-center justify-center">
                            <i data-lucide="crown" class="w-8 h-8 text-white"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-400">HOST</p>
                            <h3 id="hostName" class="text-xl font-bold">Waiting...</h3>
                        </div>
                        <div id="hostStatus" class="ml-auto">
                            <span class="px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400 text-sm font-medium">Waiting</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-400">
                        <i data-lucide="shield" class="w-4 h-4"></i>
                        <span>First Pick: <span id="firstPickDisplay">Random</span></span>
                    </div>
                </div>

                <!-- Guest -->
                <div id="guestCard" class="glass rounded-2xl p-6 player-card player-waiting">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-red-500 to-red-600 flex items-center justify-center">
                            <i data-lucide="user" class="w-8 h-8 text-white"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-400">GUEST</p>
                            <h3 id="guestName" class="text-xl font-bold">Waiting...</h3>
                        </div>
                        <div id="guestStatus" class="ml-auto">
                            <span class="px-3 py-1 rounded-full bg-gray-500/20 text-gray-400 text-sm font-medium">Empty</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-400">
                        <i data-lucide="swords" class="w-4 h-4"></i>
                        <span>BO Format: <span id="boDisplay">BO3</span></span>
                    </div>
                </div>
            </div>

            <!-- Settings & Actions -->
            <div class="glass rounded-2xl p-6 mb-6">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-6">
                        <div class="flex items-center gap-2">
                            <i data-lucide="settings" class="w-5 h-5 text-gray-400"></i>
                            <span class="text-gray-400">Settings:</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="px-3 py-1 rounded-lg bg-blue-500/20 text-blue-400 text-sm font-medium">BO<span id="settingsBO">3</span></span>
                            <span class="px-3 py-1 rounded-lg bg-purple-500/20 text-purple-400 text-sm font-medium" id="settingsFirstPick">Random First Pick</span>
                        </div>
                    </div>
                    <div id="startSection" class="hidden">
                        <button onclick="startDraft()" class="btn-primary px-8 py-3 rounded-xl font-bold text-lg flex items-center gap-2 animate-glow">
                            <i data-lucide="play" class="w-5 h-5"></i>
                            START DRAFT
                        </button>
                    </div>
                    <div id="waitingSection">
                        <span class="text-gray-400 flex items-center gap-2">
                            <span class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></span>
                            Waiting for opponent...
                        </span>
                    </div>
                </div>
            </div>

            <!-- Chat Section -->
            <div class="glass rounded-2xl p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="message-circle" class="w-5 h-5 text-blue-400"></i>
                    Chat
                </h3>
                <div id="chatMessages" class="h-48 overflow-y-auto space-y-2 mb-4 pr-2">
                    <p class="text-gray-500 text-center text-sm py-8">No messages yet</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100"
                           class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500"
                           onkeypress="if(event.key==='Enter') sendChat()">
                    <button onclick="sendChat()" class="btn-primary px-6 py-3 rounded-xl">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/waiting-room.js"></script>
</body>
</html>
